name: Test MCP Servers

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies (CPU only)
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install mcp numpy Pillow
    
    - name: Test MCP server imports
      run: |
        python -c "import py_compile; py_compile.compile('mcp-servers/image-generation/server-simple.py'); print('server-simple.py: OK')"
        python -c "import sys; sys.path.insert(0, 'mcp-servers/kokoro-tts'); import server; print('kokoro-tts server: OK')"
    
    - name: Test server startup
      run: |
        python -c "
        import subprocess, sys
        for script in ['mcp-servers/image-generation/server-simple.py', 'mcp-servers/kokoro-tts/server.py']:
            try:
                r = subprocess.run([sys.executable, script], timeout=5, capture_output=True, text=True)
                print(f'{script}: exit {r.returncode}')
            except subprocess.TimeoutExpired:
                print(f'{script}: started OK (timeout expected)')
            except Exception as e:
                print(f'{script}: {e}')
        "
    
    - name: Run test suite
      run: |
        python tests/test-mcp-servers.py || true
    
    - name: Check dependencies
      run: |
        python -c "import torch; print('PyTorch:', torch.__version__)"
        python -c "import mcp; print('MCP: OK')"
        python -c "import numpy; print('NumPy:', numpy.__version__)"
        python -c "from PIL import Image; print('Pillow: OK')"

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        pip install flake8 black
    
    - name: Lint with flake8
      run: |
        flake8 mcp-servers --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Check formatting with black
      run: |
        black --check mcp-servers || true
